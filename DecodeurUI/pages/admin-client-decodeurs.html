<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecodeurTR — Décodeurs du client</title>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <circle cx="7" cy="12" r="1.5" fill="#3b82f6" stroke="none"/>
          <circle cx="12" cy="12" r="1.5" fill="#3b82f6" stroke="none"/>
          <circle cx="17" cy="12" r="1.5" fill="#3b82f6" stroke="none"/>
        </svg>
      </div>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-name">DECODEUR<span>TR</span></div>
        <div class="sidebar-brand-sub">Panneau administrateur</div>
      </div>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Navigation</div>

    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="sidebar-link">
        <i class="fas fa-gauge-high"></i> Tableau de bord
      </a>
      <a href="admin-client.html" class="sidebar-link">
        <i class="fas fa-users"></i> Clients
      </a>
      <a href="admin-decodeurs.html" class="sidebar-link">
        <i class="fas fa-tv"></i> Décodeurs
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Déconnexion
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <div class="breadcrumb">
          <span onclick="window.location.href='admin-client.html'">
            <i class="fas fa-users"></i> Clients
          </span>
          <i class="fas fa-chevron-right"></i>
          <span id="breadcrumb-client">—</span>
        </div>
        <h1 class="page-title" id="page-title">Décodeurs du client</h1>
        <p class="page-subtitle" id="page-subtitle">Gérer les décodeurs et les chaînes associées</p>
      </div>
      <button class="btn-secondary" onclick="window.history.back()">
        <i class="fas fa-arrow-left"></i> Retour
      </button>
    </div>

    <div class="section-block">
      <div class="section-title-row">
        <div>
          <h2>Liste des décodeurs</h2>
          <p>Retirer un décodeur ou gérer ses chaînes</p>
        </div>
        <span class="section-count" id="decoder-count">—</span>
      </div>
      <div id="decoder-grid" class="decoder-grid">
        <div class="empty-state">Chargement…</div>
      </div>
    </div>
  </main>
</div>

<script src="../js/admin-client-decodeurs.js"></script>
</body>
</html>
