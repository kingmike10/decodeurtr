<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecodeurTR — Mes Décodeurs</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
 <div class="dashboard-container">
    <header>
        <h1 id="client-name">Bienvenue, …</h1>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Déconnexion
        </button>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <p>DÉCODEURS ACTIFS</p>
            <h2 id="status-count">0 / 0</h2>
        </div>
    </div>

    <div id="decoder-grid" class="decoder-grid"></div>
</div>

<!-- Modal état détaillé -->
<div id="statusModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2><i class="fas fa-info-circle"></i> État détaillé du décodeur</h2>
        <hr style="margin: 12px 0; border-color: rgba(148,163,184,0.2);">
        <div id="modal-body"></div>
    </div>
</div>

<script src="../js/client-dashboard.js"></script>
</body>
</html>
