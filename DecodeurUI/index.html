<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeurTR — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect x="2" y="6" width="24" height="16" rx="3" stroke="#22c55e" stroke-width="2"/>
                        <circle cx="8" cy="14" r="2" fill="#22c55e"/>
                        <circle cx="14" cy="14" r="2" fill="#22c55e"/>
                        <circle cx="20" cy="14" r="2" fill="#22c55e"/>
                        <line x1="14" y1="22" x2="14" y2="26" stroke="#22c55e" stroke-width="2"/>
                        <line x1="9" y1="26" x2="19" y2="26" stroke="#22c55e" stroke-width="2"/>
                    </svg>
                </div>
                <div>
                    <h1 class="brand-name">DECODEUR<span>TR</span></h1>
                    <p class="brand-sub">Système de gestion intranet</p>
                </div>
            </div>

            <div class="divider"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="identifiant">Identifiant</label>
                    <input type="text" id="identifiant" name="identifiant"
                           placeholder="Entrez votre identifiant" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>

                      <div class="form-options">
                    <a href="forgot-password.html">Mot de passe oublié ?</a>
                </div>

                <p id="message" class="form-message" aria-live="polite"></p>

                <button type="submit" id="submitBtn">
                    <span id="btn-text">Se connecter</span>
                    <span id="btn-loader" class="loader hidden"></span>
                </button>
            </form>
        </div>

        <p class="footer-note">Câblodistributeur UQTR · Accès intranet sécurisé</p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
