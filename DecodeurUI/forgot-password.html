<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecodeurTR — Mot de passe oublié</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">

    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="6" width="24" height="16" rx="3" stroke="#22c55e" stroke-width="2"/>
          <circle cx="8" cy="14" r="2" fill="#22c55e"/>
          <circle cx="14" cy="14" r="2" fill="#22c55e"/>
          <circle cx="20" cy="14" r="2" fill="#22c55e"/>
          <line x1="14" y1="22" x2="14" y2="26" stroke="#22c55e" stroke-width="2"/>
          <line x1="9" y1="26" x2="19" y2="26" stroke="#22c55e" stroke-width="2"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-name">DECODEUR<span>TR</span></h1>
        <p class="brand-sub">Récupération de mot de passe</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="steps-indicator">
      <div class="step-dot active" id="dot-1">1</div>
      <div class="step-line"></div>
      <div class="step-dot" id="dot-2">2</div>
      <div class="step-line"></div>
      <div class="step-dot" id="dot-3">✓</div>
    </div>

    <!-- ÉTAPE 1 : Identifiant -->
    <div class="step active" id="step-1">
      <div class="form-group">
        <label>Identifiant de connexion</label>
        <input type="text" id="s1-identifiant"
               placeholder="Entrez votre identifiant" autocomplete="username">
      </div>
      <p class="form-message" id="s1-message"></p>
      <button type="button" id="btn-step1">Continuer</button>
    </div>

    <!-- ÉTAPE 2 : Question + nouveau mot de passe -->
    <div class="step" id="step-2">
      <div class="question-box" id="question-display"></div>
      <div class="form-group">
        <label>Votre réponse</label>
        <input type="text" id="s2-reponse"
               placeholder="Répondez à la question secrète" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" id="s2-mdp"
               placeholder="Au moins 6 caractères" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="s2-confirm"
               placeholder="Répétez le mot de passe" autocomplete="new-password">
      </div>
      <p class="form-message" id="s2-message"></p>
      <button type="button" id="btn-step2">Réinitialiser le mot de passe</button>
    </div>

    <!-- ÉTAPE 3 : Succès -->
    <div class="step" id="step-3">
      <div class="success-icon">✅</div>
      <p class="success-title">Mot de passe réinitialisé !</p>
      <p class="success-sub">
        Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
      </p>
      <button type="button" onclick="window.location.href='index.html'">
        Retour à la connexion
      </button>
    </div>

  </div>

  <a href="index.html" class="back-link">← Retour à la connexion</a>
</div>

<script>
const API = "http://localhost:8080";
let identifiantEnCours = "";

function showMsg(elId, text, isErr) {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.style.color = isErr ? "var(--danger)" : "var(--accent)";
}

function setStep(n) {
  [1, 2, 3].forEach(i => {
    document.getElementById(`step-${i}`).classList.toggle("active", i === n);
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.classList.remove("active", "done");
    if (i < n)  dot.classList.add("done");
    if (i === n) dot.classList.add("active");
  });
}

// Étape 1 — récupérer la question secrète
document.getElementById("btn-step1").addEventListener("click", async () => {
  const identifiant = document.getElementById("s1-identifiant").value.trim();
  if (!identifiant) {
    showMsg("s1-message", "Veuillez entrer votre identifiant.", true);
    return;
  }

  const btn = document.getElementById("btn-step1");
  btn.disabled = true;

  try {
    const res  = await fetch(`${API}/api/mot-de-passe/question/${encodeURIComponent(identifiant)}`);
    const data = await res.json();

    if (data.success) {
      identifiantEnCours = identifiant;
      document.getElementById("question-display").textContent = data.question;
      setStep(2);
      setTimeout(() => document.getElementById("s2-reponse").focus(), 50);
    } else {
      showMsg("s1-message", data.message || "Identifiant introuvable.", true);
    }
  } catch {
    showMsg("s1-message", "Impossible de contacter le serveur.", true);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById("s1-identifiant").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-step1").click();
});

// Étape 2 — réinitialiser le mot de passe
document.getElementById("btn-step2").addEventListener("click", async () => {
  const reponseSecrete         = document.getElementById("s2-reponse").value.trim();
  const nouveauMotDePasse      = document.getElementById("s2-mdp").value;
  const confirmationMotDePasse = document.getElementById("s2-confirm").value;

  if (!reponseSecrete || !nouveauMotDePasse || !confirmationMotDePasse) {
    showMsg("s2-message", "Tous les champs sont obligatoires.", true);
    return;
  }
  if (nouveauMotDePasse !== confirmationMotDePasse) {
    showMsg("s2-message", "Les mots de passe ne correspondent pas.", true);
    return;
  }
  if (nouveauMotDePasse.length < 6) {
    showMsg("s2-message", "Le mot de passe doit contenir au moins 6 caractères.", true);
    return;
  }

  const btn = document.getElementById("btn-step2");
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/mot-de-passe/reset`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        identifiantConnexion: identifiantEnCours,
        reponseSecrete,
        nouveauMotDePasse,
        confirmationMotDePasse
      })
    });
    const data = await res.json();

    if (data.success) {
      setStep(3);
    } else {
      showMsg("s2-message", data.message || "Réponse incorrecte.", true);
    }
  } catch {
    showMsg("s2-message", "Impossible de contacter le serveur.", true);
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
